<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physician Compensation Modeler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
        .card { border: 1px solid #e2e8f0; border-radius: 0.75rem; background: white; padding: 1.5rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen pb-20">

    <!-- Top Branding Header -->
    <nav class="bg-white border-b border-slate-200 py-4 mb-8 px-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <!-- YOUR BRAND (Edit the src below to your logo) -->
            <div class="flex items-center gap-3">
                <img id="creatorLogo" src="https://via.placeholder.com/150x50?text=YOUR+LOGO" alt="Creator Logo" class="h-10 object-contain">
                <div class="h-8 w-[1px] bg-slate-300 mx-2"></div>
                <h1 class="font-bold text-slate-700 tracking-tight">MD Offer Engine</h1>
            </div>
            <button onclick="window.print()" class="no-print bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">
                Export to PDF
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <!-- Header: User's Dynamic Branding -->
        <div class="card mb-8 flex flex-col md:flex-row gap-8 items-center bg-gradient-to-r from-slate-50 to-white">
            <div class="flex-shrink-0 text-center">
                <div id="userImagePreview" class="w-32 h-32 rounded-full bg-white border-2 border-dashed border-slate-300 flex items-center justify-center overflow-hidden mb-2">
                    <span class="text-[10px] text-slate-400 p-2 uppercase font-bold text-center">Upload Hospital Logo</span>
                </div>
                <input type="file" id="userPhotoInput" class="no-print text-xs text-slate-500 w-32" accept="image/*">
            </div>
            
            <div class="flex-grow space-y-3 w-full">
                <input type="text" id="hospitalName" placeholder="Health System / Practice Name" class="text-3xl font-extrabold w-full border-none focus:ring-0 bg-transparent placeholder-slate-300">
                <div class="flex flex-wrap gap-4">
                    <input type="text" id="physicianName" placeholder="Physician Name, MD/DO" class="text-lg text-slate-600 border-none focus:ring-0 bg-transparent placeholder-slate-400 w-64">
                    <input type="text" id="specialty" placeholder="Specialty (e.g. Cardiology)" class="text-lg text-indigo-600 font-medium border-none focus:ring-0 bg-transparent placeholder-indigo-200 w-64">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- INPUTS -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Time & Effort Split -->
                <div class="card">
                    <h3 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-4">Time & Clinical Load</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">FTE (1.0 = Full Time)</label>
                            <input type="number" id="fte" value="1.0" step="0.1" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Clinical Hours / Week</label>
                            <input type="number" id="hoursPerWeek" value="40" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Weeks Worked / Year</label>
                            <input type="number" id="weeksPerYear" value="46" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                    </div>
                </div>

                <!-- Cash Split (Base vs Bonus) -->
                <div class="card">
                    <h3 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-4">Cash Compensation</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Annual Base Salary ($)</label>
                            <input type="number" id="baseSalary" value="280000" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">One-Time Sign-on ($)</label>
                            <input type="number" id="signOn" value="50000" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                    </div>
                </div>

                <!-- Production (wRVU) Split -->
                <div class="card bg-indigo-50 border-indigo-100">
                    <h3 class="font-bold text-indigo-900 uppercase text-xs tracking-widest mb-4">wRVU Production Model</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-indigo-900">Projected wRVUs</label>
                            <input type="number" id="wrvus" value="7000" class="mt-1 block w-full border-indigo-200 rounded-md bg-white p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-indigo-900">wRVU Threshold</label>
                            <input type="number" id="threshold" value="5000" class="mt-1 block w-full border-indigo-200 rounded-md bg-white p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-indigo-900">$/wRVU Rate</label>
                            <input type="number" id="conversion" value="55" class="mt-1 block w-full border-indigo-200 rounded-md bg-white p-2 border">
                        </div>
                    </div>
                </div>

                <!-- Physicians Specifics -->
                <div class="card">
                    <h3 class="font-bold text-slate-500 uppercase text-xs tracking-widest mb-4">Benefits & Perks (Annual)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">CME/Dues Allowance ($)</label>
                            <input type="number" id="cme" value="5000" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Employer 401k/403b Match ($)</label>
                            <input type="number" id="retirement" value="15000" class="mt-1 block w-full border-slate-300 rounded-md bg-slate-50 p-2 border">
                        </div>
                    </div>
                </div>
            </div>

            <!-- RESULTS SIDEBAR -->
            <div class="lg:col-span-1">
                <div class="card bg-slate-900 text-white sticky top-4 border-none">
                    <h2 class="text-indigo-400 font-bold uppercase text-xs tracking-widest mb-2">Total Year 1 Value</h2>
                    <p class="text-5xl font-black mb-6" id="outTCC">$0</p>
                    
                    <div class="space-y-4 pt-6 border-t border-slate-700">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 text-sm">Effective Hourly</span>
                            <span class="text-xl font-bold text-emerald-400" id="outHourly">$0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 text-sm">wRVU Production Pay</span>
                            <span class="font-semibold" id="outProduction">$0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400 text-sm">Guaranteed Cash</span>
                            <span class="font-semibold" id="outGuaranteed">$0</span>
                        </div>
                        
                        <!-- 4 Year View -->
                        <div class="mt-8 bg-slate-800 p-4 rounded-lg space-y-2">
                            <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">4-Year Forecast (Cumulative)</p>
                            <div id="projectionList" class="text-sm space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const inputs = ['fte', 'hoursPerWeek', 'weeksPerYear', 'baseSalary', 'signOn', 'wrvus', 'threshold', 'conversion', 'cme', 'retirement'];

        function calculate() {
            const vals = {};
            inputs.forEach(id => vals[id] = parseFloat(document.getElementById(id).value) || 0);

            // Production logic
            const productionPay = Math.max(0, (vals.wrvus - vals.threshold) * vals.conversion);
            
            // Year 1 vs Year 2+
            const annualRecurring = vals.baseSalary + productionPay + vals.cme + vals.retirement;
            const year1TCC = annualRecurring + vals.signOn;

            // Hourly logic
            const annualHours = vals.hoursPerWeek * vals.weeksPerYear;
            const effectiveHourly = year1TCC / (annualHours || 1);

            // Display
            document.getElementById('outTCC').innerText = format(year1TCC);
            document.getElementById('outHourly').innerText = format(effectiveHourly) + '/hr';
            document.getElementById('outProduction').innerText = format(productionPay);
            document.getElementById('outGuaranteed').innerText = format(vals.baseSalary);

            // Projections
            let listHtml = '';
            for(let i=1; i<=4; i++) {
                let cumulative = year1TCC + (annualRecurring * (i-1));
                listHtml += `
                    <div class="flex justify-between">
                        <span class="text-slate-400 text-xs text-left">Yr ${i} Cumulative:</span>
                        <span class="font-mono text-indigo-300 font-bold">${format(cumulative)}</span>
                    </div>`;
            }
            document.getElementById('projectionList').innerHTML = listHtml;
        }

        function format(n) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
        }

        // Image Handling
        document.getElementById('userPhotoInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('userImagePreview').innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calculate));
        calculate();
    </script>
</body>
</html>
