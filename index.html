<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physician Offer Modeler</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">

    <!-- NAVIGATION / YOUR BRANDING -->
    <nav class="bg-white border-b border-slate-200 p-4 mb-6 no-print">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- REPLACE THE URL BELOW WITH YOUR LOGO URL -->
                <img src="vog-logo.png" alt="Logo" class="h-8">
                <span class="font-bold text-slate-700 border-l pl-4 border-slate-200">Physician Comp Pro</span>
            </div>
            <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-bold text-sm transition">
                Download PDF Report
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        
        <!-- HEADER SECTION: HOSPITAL BRANDING -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8 mb-6">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <!-- User Upload for Hospital Logo -->
                <div class="flex-shrink-0 text-center">
                    <div id="logoPreview" class="w-32 h-32 rounded-lg border-2 border-dashed border-slate-300 flex items-center justify-center bg-slate-50 overflow-hidden">
                        <span class="text-slate-400 text-[10px] uppercase font-bold p-2">Hospital Logo</span>
                    </div>
                    <input type="file" id="userLogoInput" class="no-print mt-2 text-xs w-32" accept="image/*">
                </div>

                <!-- Text Headings -->
                <div class="flex-grow w-full space-y-2">
                    <input type="text" id="hospitalName" placeholder="Health System Name (Click to Edit)" class="w-full text-3xl font-black text-slate-800 border-none focus:ring-2 focus:ring-indigo-500 rounded px-2 bg-transparent">
                    <input type="text" id="candidateName" placeholder="Physician Name, MD/DO" class="w-full text-xl text-indigo-600 font-semibold border-none focus:ring-2 focus:ring-indigo-500 rounded px-2 bg-transparent">
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- LEFT COLUMN: INPUTS -->
            <div class="lg:col-span-2 space-y-6">
                
                <!-- Section 1: Effort -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Clinical Commitment</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">FTE Status</label>
                            <input type="number" id="fte" value="1.0" step="0.1" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Clinical Hrs / Wk</label>
                            <input type="number" id="hoursPerWeek" value="40" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Weeks / Year</label>
                            <input type="number" id="weeksPerYear" value="48" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                    </div>
                </div>

                <!-- Section 2: Cash -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Cash Compensation</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Annual Base Salary ($)</label>
                            <input type="number" id="baseSalary" value="250000" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Sign-on Bonus ($)</label>
                            <input type="number" id="signOn" value="25000" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Production -->
                <div class="bg-indigo-900 p-6 rounded-xl shadow-lg text-white">
                    <h3 class="text-sm font-bold text-indigo-300 uppercase tracking-widest mb-4">wRVU Production Model</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold mb-1 uppercase">Est. Annual wRVUs</label>
                            <input type="number" id="actualWRVUs" value="6500" class="w-full p-2 bg-indigo-800 border border-indigo-700 rounded text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1 uppercase">wRVU Threshold</label>
                            <input type="number" id="threshold" value="4800" class="w-full p-2 bg-indigo-800 border border-indigo-700 rounded text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1 uppercase">$/wRVU Conversion</label>
                            <input type="number" id="conversion" value="50" class="w-full p-2 bg-indigo-800 border border-indigo-700 rounded text-white">
                        </div>
                    </div>
                </div>

                <!-- Section 4: Benefits -->
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Benefits & Perks</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Annual CME/Dues ($)</label>
                            <input type="number" id="cme" value="5000" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1 uppercase">Retirement Match ($)</label>
                            <input type="number" id="retirement" value="10000" class="w-full p-2 bg-slate-50 border border-slate-200 rounded">
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: RESULTS -->
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-indigo-600 sticky top-6">
                    <div class="mb-8">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Year 1 Total Cash (TCC)</p>
                        <h2 class="text-5xl font-black text-slate-900" id="displayTCC">$0</h2>
                    </div>

                    <div class="space-y-4 border-t border-slate-100 pt-6">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500 italic">Effective Hourly Rate:</span>
                            <span class="font-bold text-emerald-600" id="displayHourly">$0/hr</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500 italic">Production Component:</span>
                            <span class="font-bold text-slate-800" id="displayProd">$0</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500 italic">Guaranteed Base:</span>
                            <span class="font-bold text-slate-800" id="displayBase">$0</span>
                        </div>
                    </div>

                    <div class="mt-8 bg-slate-50 p-4 rounded-lg">
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-3">4-Year Potential Accumulation</h4>
                        <div id="projectionList" class="space-y-2 text-sm">
                            <!-- JS will populate -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // List of all inputs we need to watch
        const fields = ['fte', 'hoursPerWeek', 'weeksPerYear', 'baseSalary', 'signOn', 'actualWRVUs', 'threshold', 'conversion', 'cme', 'retirement'];

        function runCalculator() {
            // 1. Get Values
            const data = {};
            fields.forEach(f => {
                data[f] = parseFloat(document.getElementById(f).value) || 0;
            });

            // 2. Calculations
            const productionPay = Math.max(0, (data.actualWRVUs - data.threshold) * data.conversion);
            const standardYearly = data.baseSalary + productionPay + data.cme + data.retirement;
            const year1Total = standardYearly + data.signOn;

            const totalHours = data.hoursPerWeek * data.weeksPerYear;
            const hourlyRate = totalHours > 0 ? (year1Total / totalHours) : 0;

            // 3. Update Displays
            document.getElementById('displayTCC').innerText = fmt(year1Total);
            document.getElementById('displayHourly').innerText = fmt(hourlyRate) + '/hr';
            document.getElementById('displayProd').innerText = fmt(productionPay);
            document.getElementById('displayBase').innerText = fmt(data.baseSalary);

            // 4. Cumulative Table
            let tableHtml = '';
            for(let i=1; i<=4; i++) {
                let cumulative = year1Total + (standardYearly * (i-1));
                tableHtml += `
                    <div class="flex justify-between items-center font-mono">
                        <span class="text-slate-500">Year ${i}:</span>
                        <span class="font-bold text-slate-800">${fmt(cumulative)}</span>
                    </div>`;
            }
            document.getElementById('projectionList').innerHTML = tableHtml;
        }

        // Helper: Format to USD
        function fmt(num) {
            return new Intl.NumberFormat('en-US', { 
                style: 'currency', 
                currency: 'USD', 
                maximumFractionDigits: 0 
            }).format(num);
        }

        // Handle User Logo Upload
        document.getElementById('userLogoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('logoPreview').innerHTML = `<img src="${event.target.result}" class="w-full h-full object-contain p-1">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Add Listeners to every input field
        fields.forEach(id => {
            document.getElementById(id).addEventListener('input', runCalculator);
        });

        // Run once on startup
        runCalculator();
    </script>
</body>
</html>
